spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

clickhouse:
  url: jdbc:ch://localhost:8123/digitaltwin?ssl=false&connect_timeout=10000&socket_timeout=300000&compress=0
  username: ${CLICKHOUSE_USER:app}
  password: ${CLICKHOUSE_PASS:app123}

gateway:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

postgres:
  url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/telemetry}
  username: ${POSTGRES_USER:postgres}
  password: ${POSTGRES_PASSWORD:postgres}
  pool:
    max-size: 10
    min-idle: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus