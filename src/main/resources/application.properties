spring.application.name=api-gateway
server.port=8080

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

clickhouse.url=jdbc:clickhouse://${CLICKHOUSE_HOST:localhost}:${CLICKHOUSE_PORT:8123}/digitaltwin
clickhouse.username=${CLICKHOUSE_USER:default}
clickhouse.password=${CLICKHOUSE_PASS:}

# CORS for frontend dev server
gateway.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
